<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floresta Tropical</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #031409;
      font-family: Arial, sans-serif;
    }

    header {
      background-color: #0a3d1f;
      padding: 15px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .logo {
      display: flex;
      align-items: center;
    }

    .logo img {
      height: 70px;
      width: auto;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 8px;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      display: block;
      padding: 12px 24px;
      color: #d4e8c9;
      text-decoration: none;
      font-weight: 500;
      border-radius: 6px;
      transition: all 0.3s ease;
      font-size: 1rem;
    }

    nav ul li a:hover {
      background-color: #1e5c38;
      color: #000;
    }

    .active {
      background-color: #2e8b57;
      color: white;
      font-weight: 600;
    }

    .donate-btn {
      background-color: #4caf50;
      color: white;
      padding: 12px 28px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 4px 8px rgba(76, 175, 80, 0.3);
      transition: all 0.3s ease;
    }

    .donate-btn:hover {
      background-color: #3d9c43;
      transform: translateY(-2px);
    }

    .main-content {
      display: flex;
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 5%;
      gap: 40px;
      align-items: flex-start;
    }

    .main-content img {
      width: 100%;
      margin-top: 50px;

      width: 800px;
      border-radius: 8px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
    }

    .text-content {
      color: white;
      font-size: 1.35rem;
      line-height: 1.5;
      margin-top: 160px;
    }

    .text-content strong {
      color: #4caf50;
      margin-top: 160px;
    }
  </style>
</head>

<body>

  <header>
    <a href="#" class="logo">
      <img src="/caminho-da-sua-imagem/logo-arvore.png" alt="Logo Floresta Tropical">
    </a>

    <nav>
      <ul>
        <li><a href="#">INÍCIO</a></li>
        <li><a href="#">NOTÍCIAS</a></li>
        <li><a href="#" class="active">CONTEÚDO</a></li>
        <li><a href="#">CONTATO</a></li>
      </ul>
    </nav>

    <a href="#" class="donate-btn">DOE AGORA</a>
  </header>

  <div class="main-content">
    <img
      src="https://images.squarespace-cdn.com/content/v1/60008752251f2338669c0f3a/1659536575762-2LKXJGHPY9CKVD3LZXQK/stream-in-temperate-rainforest-wales-coed-nant-gwernol-and-coed-hendrewallog-24-jordan-mansfield.jpg"
      alt="Floresta Tropical com riacho e musgo">

    <div class="text-content">
      <p>A <strong>floresta tropical</strong> é um tipo de ecossistema, classificado como <strong>bioma</strong>, que
        possui uma das biodiversidades mais ricas do planeta.</p>
    </div>
  </div>

</body>

</html>
